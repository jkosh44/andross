syntax = "proto3";
package server.proto.kv.v1;

service KvService {
  rpc Insert(InsertRequest) returns (InsertResponse);
}

service RaftService {
  rpc Message(MessageRequest) returns (MessageResponse);
}

message InsertRequest {
  bytes tuple = 1;
}

message InsertResponse {}

message MessageRequest {
  // Serialized raft messages. Ideally we would just import the raft-rs Message proto message and use that here.
  // Unfortunately, that doesn't seem possible, so we just serialize the whole proto message and use it's bytes.
  repeated bytes messages_bytes = 1;
}

message MessageResponse {}
